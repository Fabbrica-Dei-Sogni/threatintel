# ThreatIntel Virtual Host Configuration
# Spostare in /etc/nginx/sites-available/threatintel.conf e creare symlink in sites-enabled

server {
    listen 443 ssl;
    server_name alessandromodica.com;

    ssl_certificate /etc/letsencrypt/live/alessandromodica.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alessandromodica.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API ThreatIntel
    location /honeypot/api/ {
        proxy_pass http://localhost:3999/api/;
        
        # Gestione dei redirect interni (fondamentale per Swagger)
        proxy_redirect /api/ /honeypot/api/;
        proxy_redirect http://localhost:3999/api/ https://alessandromodica.com/honeypot/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supporto Socket.io per ThreatIntel
    location /honeypot/socket.io/ {
        proxy_pass http://localhost:3999/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
            
        # Opzionale: aumenta i timeout per evitare disconnessioni frequenti
        proxy_read_timeout 86400;
    }

    # Forza trailing slash per le chiamate API dirette (es. api-docs)
    rewrite ^/honeypot/api$ /honeypot/api/ permanent;

    # Frontend HUD
    location /honeypot/ {
        proxy_pass http://localhost:8180/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SPA fallback gestito dal proxy (opzionale se già fatto da 8180 interna, ma consigliato)
        # try_files $uri $uri/ /honeypot/index.html;
    }

    # Streaming log JSON verso syslog per threat intel (solo URI sospetti filtrati sul backend)
    access_log syslog:server=unix:/dev/log,tag=nginx_threat json_threatintel;
}

# Gateway Principale & Honeypot Multiplexer
server {
    listen 80;
    listen [::]:80;
    
    # Porte Traps (Aggiungi qui tutte le porte che vuoi monitorare)
    listen 8080;
    listen 8000;
    listen 5000;
    listen 4200;
    listen 7000;

    server_name _; # Risponde a tutto ciò che non è un dominio specifico

    # Access Log in formato JSON per il servizio di analisi
    access_log /var/log/nginx/threatintel_access.log json_threatintel;
    error_log /var/log/nginx/threatintel_error.log warn;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # Blocha User Agents sospetti (Esempio)
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|netsparker)) {
        return 444;
    }

    # Location principale - Proxy verso il backend Node.js
    location / {
        proxy_pass http://127.0.0.1:3999;
        
        # Header fondamentali per l'Honeypot
        proxy_set_header X-Server-Port $server_port; # CRUCIALE: Dice al backend su che porta è entrato l'attaccante
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket support (per futuri update dashboard)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_cache_bypass $http_upgrade;
    }

    # Endpoint Sensibile: Login (Protezione rinforzata)
    location /login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3999;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # API stats con restrizioni severe
    location /api/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        
        proxy_pass http://127.0.0.1:3999;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Protezione file sensibili
    location ~ /\. { deny all; access_log off; log_not_found off; }
}

# Honeypot SSL Traps
server {
    listen 8443 ssl;
    listen 9443 ssl;
    listen 10443 ssl;
    server_name alessandromodica.com;

    ssl_certificate /etc/letsencrypt/live/alessandromodica.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alessandromodica.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/threatintel_access.log json_threatintel;

    location / {
        proxy_pass http://127.0.0.1:3999;
        proxy_set_header X-Server-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}

# Secure Proxy for other services (es. RedisInsight/ChainPrompt fallback)
server {
    listen 5543 ssl;
    server_name alessandromodica.com;

    ssl_certificate /etc/letsencrypt/live/alessandromodica.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alessandromodica.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:5540/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;
    }    
}
