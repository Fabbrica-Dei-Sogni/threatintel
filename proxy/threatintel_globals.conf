# ThreatIntel Global Configurations
# Spostare in /etc/nginx/conf.d/threatintel_globals.conf

# 1. Custom Logging Format (JSON per Ingestion)
log_format json_threatintel escape=json
  '{'
    '"timestamp":"$time_iso8601",'
    '"ip":"$remote_addr",'
    '"method":"$request_method",'
    '"url":"$request_uri",'
    '"status":"$status",'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"server_port":"$server_port"'
  '}';

# 2. Global Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# 3. Global Security Headers (Ottimizzati per portabilità)
# Nota: Questi verranno ereditati da tutti i blocchi server se non sovrascritti
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 4. Gzip Optimizations (Opzionali)
#gzip_vary on;
#gzip_min_length 1024;
#gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
